name: Refresh RFC Data

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-rfc-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Refresh RFC caches and static frontend list
        run: python backend/scripts/refresh_rfc_data.py

      - name: Commit refreshed RFC data
        id: commit_refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f backend/cache/rfc_index.json backend/cache/rfc_index.xml frontend/top-rfcs.json
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh RFC data cache"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.commit_refresh.outputs.committed == 'true'
        run: git push