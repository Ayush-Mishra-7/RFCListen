<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="RFCListen — Listen to IETF RFCs with TTS, section navigation, and smart parsing for Network Engineers." />
  <title>RFCListen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── App Shell ────────────────────────────────────────────────────── -->
  <div id="app">

    <!-- Sidebar: RFC Browser -->
    <aside id="sidebar" aria-label="RFC Browser">
      <div class="sidebar-header">
        <h1 class="logo">📡 RFCListen</h1>
        <div class="search-wrap">
          <input id="rfc-search" type="search" placeholder="Search RFCs…" aria-label="Search RFCs by number or title"
            autocomplete="off" />
        </div>
        <div class="filter-row">
          <select id="filter-status" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="standards track">Standards Track</option>
            <option value="informational">Informational</option>
            <option value="bcp">BCP</option>
            <option value="experimental">Experimental</option>
            <option value="historic">Historic</option>
          </select>
        </div>
      </div>

      <ul id="rfc-list" aria-label="RFC list" role="listbox">
        <!-- Populated by app.js -->
        <li class="rfc-list-placeholder">Loading RFCs…</li>
      </ul>

      <div class="pagination">
        <button id="btn-prev-page" aria-label="Previous page" disabled>← Prev</button>
        <span id="page-info" aria-live="polite">Page 1</span>
        <button id="btn-next-page" aria-label="Next page">Next →</button>
      </div>

      <!-- Recently Played -->
      <div class="recents-section">
        <h3 class="recents-heading">⏱ Recently Played</h3>
        <div id="recents-list" aria-label="Recently played RFCs">
          <div class="recents-empty">No recently played RFCs</div>
        </div>
      </div>
    </aside>

    <!-- Main Panel: Reader + Section Nav -->
    <main id="main-panel" aria-label="RFC Reader">

      <!-- RFC Header -->
      <header id="rfc-header" class="hidden">
        <div class="rfc-meta">
          <span id="rfc-badge" class="badge"></span>
          <span id="rfc-date" class="meta-date"></span>
        </div>
        <h2 id="rfc-title"></h2>
        <p id="rfc-authors" class="authors"></p>
      </header>

      <!-- Section Timestamps Nav -->
      <nav id="sections-nav" aria-label="RFC sections" class="hidden">
        <h3 class="nav-heading">Sections</h3>
        <ul id="sections-list">
          <!-- Populated by app.js -->
        </ul>
      </nav>

      <!-- RFC Content Viewer -->
      <article id="rfc-content" aria-live="polite">
        <div id="welcome-screen">
          <div class="welcome-icon">📻</div>
          <h2>Select an RFC to start listening</h2>
          <p>Browse 9,000+ IETF RFCs from the sidebar. Click any RFC to load and play it.</p>
        </div>
        <!-- Sections rendered here by app.js -->
      </article>

    </main>

  </div>

  <!-- ── Audio Player Bar ──────────────────────────────────────────────── -->
  <footer id="player-bar" class="hidden" aria-label="Audio player controls">
    <div class="player-now-playing">
      <span id="player-rfc-label" class="player-rfc"></span>
      <span id="player-section-label" class="player-section"></span>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button id="btn-prev-section" aria-label="Previous section" title="Previous section (←)">⏮</button>
        <button id="btn-play-pause" aria-label="Play" title="Play / Pause (Space)">▶</button>
        <button id="btn-next-section" aria-label="Next section" title="Next section (→)">⏭</button>
      </div>
      <div class="player-progress">
        <div class="progress-bar" role="progressbar" aria-label="Section progress">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="section-progress" class="section-counter" aria-live="polite"></span>
      </div>
    </div>

    <div class="player-options">
      <label for="speed-select" class="sr-only">Playback speed</label>
      <select id="speed-select" aria-label="Playback speed">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>

      <label for="voice-select" class="sr-only">Voice</label>
      <select id="voice-select" aria-label="TTS voice">
        <!-- Populated by app.js from speechSynthesis.getVoices() -->
      </select>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>

</html>
